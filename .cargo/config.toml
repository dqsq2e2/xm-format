[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-args=-Wl,-z,noexecstack"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "link-args=-Wl,-z,noexecstack"]

[target.x86_64-pc-windows-msvc]
# Windows MSVC toolchain does not support -C no-stack-check or -C stack-probes=no
# We rely on default behavior for Windows as the issue is specific to Linux x86 containers

